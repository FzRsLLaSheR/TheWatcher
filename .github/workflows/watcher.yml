name: GitHub Keyword Watcher

on:
  schedule:
 
    - cron: "0 */6 * * *"

  
  workflow_dispatch:

permissions:
  contents: write   

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python watcher.py

      - name: Commit aggiornamenti
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add previous_results.json monitor.log || true
          git add previous_results.json.bk 2>/dev/null || true

         
          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: watcher update ${TIMESTAMP}"
            git push
          fi
